<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Profit Dashboard Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="parser.js"></script>
  <script src="profit-engine.js"></script>
  <style>
    .drag-over { border: 2px dashed #3b82f6; background: #eff6ff; }
    .dark { background-color: #111827; color: white; }
    .dark .card { background-color: #1f2937; border-color: #374151; }
  </style>
</head>
<body class="bg-gray-50 transition-colors duration-200">
  <div class="max-w-7xl mx-auto p-6">
    <div class="flex justify-between items-center mb-8">
      <h1 class="text-2xl font-bold">📊 Quản lý Lợi nhuận</h1>
      <button onclick="document.body.classList.toggle('dark')" class="px-4 py-2 bg-gray-200 dark:bg-gray-700 rounded-lg">🌓 Dark Mode</button>
    </div>

    <div id="dropZone" class="mb-8 p-10 border-2 border-dashed border-gray-300 rounded-xl bg-white dark:bg-gray-800 text-center cursor-pointer hover:border-blue-500 transition-all">
      <div class="text-4xl mb-4">📥</div>
      <p class="text-gray-500">Kéo thả file CSV Shopee/Lazada/TikTok vào đây hoặc <span class="text-blue-500 font-bold">chọn file</span></p>
      <input type="file" id="fileInput" class="hidden" accept=".csv">
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
      <div class="card p-6 bg-white rounded-xl shadow-sm border">
        <p class="text-sm text-gray-500">Tổng doanh thu</p>
        <p id="totalRev" class="text-2xl font-bold text-blue-600">0đ</p>
      </div>
      <div class="card p-6 bg-white rounded-xl shadow-sm border">
        <p class="text-sm text-gray-500">Tổng lợi nhuận</p>
        <p id="totalProfit" class="text-2xl font-bold text-green-600">0đ</p>
      </div>
      <div class="card p-6 bg-white rounded-xl shadow-sm border">
        <p class="text-sm text-gray-500">Số đơn hàng</p>
        <p id="totalOrders" class="text-2xl font-bold text-orange-600">0</p>
      </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
      <div class="card p-6 bg-white rounded-xl shadow-sm border"><canvas id="monthlyChart"></canvas></div>
      <div class="card p-6 bg-white rounded-xl shadow-sm border"><canvas id="topSkuChart"></canvas></div>
    </div>
  </div>

  <script>
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    let charts = {};

    // Xử lý kéo thả
    dropZone.onclick = () => fileInput.click();
    dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('drag-over'); };
    dropZone.ondragleave = () => dropZone.classList.remove('drag-over');
    dropZone.ondrop = (e) => {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      handleFiles(e.dataTransfer.files[0]);
    };
    fileInput.onchange = (e) => handleFiles(e.target.files[0]);

    async function handleFiles(file) {
      if (!file) return;
      const text = await file.text();
      const orders = Parser.parse(text);
      
      if (orders.length > 0) {
        updateUI(orders);
        alert(`Đã nhận diện: ${orders[0].platform.toUpperCase()} - ${orders.length} đơn`);
      } else {
        alert('Không nhận diện được định dạng sàn!');
      }
    }

    function updateUI(orders) {
      const rev = orders.reduce((s, o) => s + o.rev, 0);
      const profit = orders.reduce((s, o) => s + o.profit, 0);
      
      document.getElementById('totalRev').textContent = rev.toLocaleString() + 'đ';
      document.getElementById('totalProfit').textContent = profit.toLocaleString() + 'đ';
      document.getElementById('totalOrders').textContent = orders.length;

      renderCharts(orders);
    }

    function renderCharts(orders) {
      const skuData = ProfitEngine.bySKU(orders);
      
      if (charts.topSku) charts.topSku.destroy();
      charts.topSku = new Chart(document.getElementById('topSkuChart'), {
        type: 'bar',
        data: {
          labels: skuData.map(d => d.sku.substring(0, 15)),
          datasets: [{ label: 'Lợi nhuận theo SKU', data: skuData.map(d => d.profit), backgroundColor: '#3b82f6' }]
        },
        options: { indexAxis: 'y' }
      });
    }
  </script>
</body>
</html>
