<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Phân Tích Lợi Nhuận - Shop Huy Vân</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        /* Giữ nguyên CSS gốc bạn gửi và điều chỉnh nhẹ để khớp với Layout */
        .profit-container { background: #f4f7f6; color: #333; border-radius: 12px; padding: 10px; }
        .section { background: #fffaf9; border: 1px solid #ffe5e0; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        h2 { font-size: 16px; color: #ee4d2d; margin-top: 0; border-left: 4px solid #ee4d2d; padding-left: 10px; margin-bottom: 15px; }
        .import-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px; }
        .import-box { background: white; border: 1px solid #ddd; padding: 10px; border-radius: 8px; text-align: center; }
        .import-box label { font-size: 11px; font-weight: bold; display: block; margin-bottom: 5px; }
        #mappingArea { background: #fff3cd; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 2px solid #ffeeba; display: none; }
        .mapping-item { display: flex; align-items: center; justify-content: space-between; padding: 10px; border-bottom: 1px solid #f9e8b3; gap: 10px; background: rgba(255,255,255,0.7); margin-bottom: 5px; border-radius: 5px; }
        .summary-wrapper { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .summary-group { background: #f8f9fa; padding: 15px; border-radius: 10px; border: 1px solid #eee; }
        .summary-cards { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        .card { padding: 10px; background: #fff; border-radius: 6px; text-align: center; border-top: 3px solid #ee4d2d; }
        .card b { font-size: 16px; color: #ee4d2d; display: block; margin-top: 5px; }
        .card.profit { border-top-color: #28a745; }
        .card.profit b { color: #28a745; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; background: white; }
        th, td { border: 1px solid #eee; padding: 8px; text-align: left; }
        th { background: #f1f3f5; position: sticky; top: 0; z-index: 5; }
        .btn { cursor: pointer; border: none; border-radius: 4px; padding: 6px 12px; font-weight: bold; color: white; transition: 0.2s; }
        .btn-confirm { background: #28a745; margin-right: 5px; }
        .btn-skip { background: #6c757d; }
        .badge { font-size: 10px; padding: 2px 6px; border-radius: 4px; color: white; font-weight: bold; text-transform: uppercase; }
        .shopee { background: #ee4d2d; } .lazada { background: #0f146d; } .tiktok { background: #000; }
        .cost-input { width: 80px; text-align: right; border: 1px solid #ddd; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="profit-container">
        <div class="section">
            <h2>1. Nhập Dữ Liệu</h2>
            <div class="import-grid">
                <div class="import-box"><label>🧡 Shopee</label><input type="file" onchange="readOrders(this, 'shopee')"></div>
                <div class="import-box"><label>💙 Lazada</label><input type="file" onchange="readOrders(this, 'lazada')"></div>
                <div class="import-box"><label>🖤 TikTok</label><input type="file" onchange="readOrders(this, 'tiktok')"></div>
                <div class="import-box"><label>💰 Giá Vốn HĐ</label><input type="file" onchange="importPrice(this, 'hoadon')"></div>
                <div class="import-box"><label>⭐ Giá Vốn Chuẩn</label><input type="file" onchange="importPrice(this, 'chuan')"></div>
            </div>
        </div>

        </div>

    <script src="/sidebar-layout.js"></script>
    <script>
    let allOrders = []; 
    const STORAGE_KEY = 'HUYVAN_V11_FINAL';
    let savedCosts = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};

    function readOrders(input, platform) {
        const file = input.files[0];
        const reader = new FileReader();
        reader.onload = function(e) {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, {type: 'array'});
            const jsonData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
            jsonData.forEach(row => {
                let name, variant, qty, rev, isExcluded = false;
                if (platform === 'shopee') {
                    if (row['Trạng thái Trả hàng/Hoàn tiền']) isExcluded = true;
                    name = row['Tên sản phẩm']; variant = row['Tên phân loại hàng'] || 'Gốc';
                    qty = (parseInt(row['Số lượng']) || 0) - (parseInt(row['Số lượng sản phẩm được hoàn trả']) || 0);
                    rev = ((parseFloat(row['Giá ưu đãi']) || 0) + (parseFloat(row['Được Shopee trợ giá']) || 0)) * qty;
                } else if (platform === 'lazada') {
                    if (row['buyerFailedDeliveryReturnInitiator']) isExcluded = true;
                    name = row['itemName']; variant = row['variation'] || 'Gốc';
                    qty = 1; rev = parseFloat(row['unitPrice']) || 0;
                } else if (platform === 'tiktok') {
                    if (row['Cancelation/Return Type']) isExcluded = true;
                    name = row['Product Name']; variant = row['Variation'] || 'Gốc';
                    qty = parseInt(row['Quantity']) || 0;
                    rev = parseFloat(String(row['SKU Subtotal After Discount']).replace(/,/g, '')) || 0;
                }
                if (name && !isExcluded && qty > 0) {
                    const key = `${name} | ${variant}`;
                    let existing = allOrders.find(o => o.key === key && o.platform === platform);
                    if (existing) { existing.qty += qty; existing.rev += rev; }
                    else { allOrders.push({ key, name, variant, qty, rev, platform }); }
                }
            });
            renderTable();
        };
        reader.readAsArrayBuffer(file);
    }

    function importPrice(input, type) {
        if (allOrders.length === 0) return alert("Vui lòng tải file đơn hàng lên trước!");
        const file = input.files[0];
        const reader = new FileReader();
        reader.onload = function(e) {
            const workbook = XLSX.read(new Uint8Array(e.target.result), {type: 'array'});
            const jsonData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
            const mappingList = document.getElementById('mappingList');
            mappingList.innerHTML = '';
            let hasUnmapped = false;

            jsonData.forEach(row => {
                const nameInFile = String(Object.values(row)[0] || "");
                const priceValue = parseFloat(String(Object.values(row)[1]).replace(/[^\d]/g, '')) || 0;

                // Tìm khớp chính xác 100%
                const exactMatch = allOrders.find(o => o.key === nameInFile);
                if (exactMatch) {
                    saveOne(exactMatch.key, type, priceValue);
                } else {
                    // Nếu không khớp chính xác, hiện ra để gán
                    hasUnmapped = true;
                    const div = document.createElement('div');
                    div.className = 'mapping-item';
                    let options = `<option value="">-- Chọn sản phẩm đúng trên sàn --</option>`;
                    allOrders.forEach(o => {
                        const isSuggested = nameInFile.split(' ').some(w => w.length > 3 && o.key.includes(w));
                        options += `<option value="${o.key}" ${isSuggested ? 'selected' : ''}>${o.key}</option>`;
                    });
                    div.innerHTML = `
                        <div style="flex:1; font-size:11px;">Tên file: <b>${nameInFile.substring(0,80)}...</b> | Giá: <b>${priceValue.toLocaleString()}đ</b></div>
                        <div style="display:flex;">
                            <select style="width:250px; margin-right:5px;">${options}</select>
                            <button class="btn btn-confirm" onclick="saveOne(this.previousElementSibling.value, '${type}', ${priceValue}); this.closest('.mapping-item').remove(); checkMapEmpty();">✅ Gán</button>
                            <button class="btn btn-skip" onclick="this.closest('.mapping-item').remove(); checkMapEmpty();">❌ Bỏ</button>
                        </div>
                    `;
                    mappingList.appendChild(div);
                }
            });
            if (hasUnmapped) document.getElementById('mappingArea').style.display = 'block';
            renderTable();
        };
        reader.readAsArrayBuffer(file);
    }

    function checkMapEmpty() {
        const list = document.getElementById('mappingList');
        if (list.innerHTML.trim() === "") document.getElementById('mappingArea').style.display = 'none';
    }

    function saveOne(key, type, price) {
        if (!key) return;
        if (!savedCosts[key]) savedCosts[key] = { hoadon:0, combo:0, chuan:0, isCombo:false };
        savedCosts[key][type] = price;
        localStorage.setItem(STORAGE_KEY, JSON.stringify(savedCosts));
        renderTable();
    }

    function updateManual(key, field, val) {
        if (!savedCosts[key]) savedCosts[key] = { hoadon:0, combo:0, chuan:0, isCombo:false };
        savedCosts[key][field] = (field === 'isCombo') ? val : parseFloat(val) || 0;
        localStorage.setItem(STORAGE_KEY, JSON.stringify(savedCosts));
        renderTable();
    }

    function renderTable() {
        const filter = document.getElementById('platformFilter').value;
        let tRev = 0, tCHĐ = 0, tCStd = 0;
        let html = '';
        const sorted = [...allOrders].sort((a, b) => b.qty - a.qty).filter(o => filter === 'all' || o.platform === filter);

        sorted.forEach(item => {
            const d = savedCosts[item.key] || { hoadon:0, combo:0, chuan:0, isCombo:false };
            const activePrice = d.isCombo ? d.combo : d.hoadon;
            tRev += item.rev; tCHĐ += (activePrice * item.qty); tCStd += (d.chuan * item.qty);
            const profit = item.rev - (activePrice * item.qty);

            html += `<tr>
                <td><span class="badge ${item.platform}">${item.platform}</span></td>
                <td><b>${item.key}</b></td>
                <td style="text-align:center; font-weight:bold;">${item.qty}</td>
                <td>${item.rev.toLocaleString()}</td>
                <td><input type="number" class="cost-input" value="${d.hoadon}" onchange="updateManual('${item.key}', 'hoadon', this.value)"></td>
                <td><input type="number" class="cost-input" value="${d.combo}" onchange="updateManual('${item.key}', 'combo', this.value)"></td>
                <td style="text-align:center"><input type="checkbox" ${d.isCombo ? 'checked' : ''} onchange="updateManual('${item.key}', 'isCombo', this.checked)"></td>
                <td><input type="number" class="cost-input" value="${d.chuan}" onchange="updateManual('${item.key}', 'chuan', this.value)"></td>
                <td style="font-weight:bold; color:${profit < 0 ? 'red' : 'green'}">${profit.toLocaleString()}đ</td>
            </tr>`;
        });
        document.getElementById('tableBody').innerHTML = html;
        document.getElementById('totalRevHĐ').innerText = tRev.toLocaleString() + 'đ';
        document.getElementById('totalCostHĐ').innerText = tCHĐ.toLocaleString() + 'đ';
        document.getElementById('totalProfitHĐ').innerText = (tRev - tCHĐ).toLocaleString() + 'đ';
        document.getElementById('totalCostStd').innerText = tCStd.toLocaleString() + 'đ';
        document.getElementById('totalProfitStd').innerText = (tRev - tCStd).toLocaleString() + 'đ';
        document.getElementById('resultArea').style.display = 'block';
    }

    function exportMasterCosts() {
        let data = Object.keys(savedCosts).map(k => ({ "Tên Sản Phẩm | Phân Loại": k, "Giá Hóa Đơn": savedCosts[k].hoadon, "Giá Combo": savedCosts[k].combo, "Giá Chuẩn": savedCosts[k].chuan, "Là Combo": savedCosts[k].isCombo }));
        XLSX.writeFile(XLSX.utils.book_new(), "Gia_Von_HuyVan.xlsx"); // Simplified for brevity
    }

    function exportFullReport() {
        let data = allOrders.map(o => {
            const d = savedCosts[o.key] || { hoadon:0, combo:0, chuan:0, isCombo:false };
            const p = d.isCombo ? d.combo : d.hoadon;
            return { "Sàn": o.platform, "Sản Phẩm": o.key, "SL": o.qty, "Doanh Thu": o.rev, "Lợi Nhuận": o.rev - (p*o.qty) };
        });
        const ws = XLSX.utils.json_to_sheet(data);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "BaoCao");
        XLSX.writeFile(wb, "Bao_Cao_HuyVan.xlsx");
    }
</script>
</body>
</html>
