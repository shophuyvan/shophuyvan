<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Profit Analysis</title>
<script src="parser.js"></script>
<script src="profit-engine.js"></script>
</head>
<body>

<h2>Profit by SKU</h2>

<input type="file" id="fileInput">

<table border="1" id="table">
<thead>
<tr>
<th>SKU</th>
<th>Revenue</th>
<th>Cost</th>
<th>Profit</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>

fileInput.onchange = async e=>{

const text = await e.target.files[0].text()

const orders = Parser.parse(text)

const sku = ProfitEngine.bySKU(orders)

render(sku)

}

function render(data){

const body = document.querySelector('#table tbody')

body.innerHTML=''

for(const s of data){

body.innerHTML+=`<tr>
<td>${s.sku}</td>
<td>${s.revenue}</td>
<td>${s.cost}</td>
<td>${s.profit}</td>
</tr>`

}

}

</script>

</body>
</html>
